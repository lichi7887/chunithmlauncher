name: build-launcher

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    env:
      BUILD_VERSION: 1.0.${{ github.run_number }}-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore src/ChunithmLauncher/ChunithmLauncher.csproj
      - name: Build
        run: dotnet build src/ChunithmLauncher/ChunithmLauncher.csproj -c Release -p:BuildVersion=${env:BUILD_VERSION}
      - name: Publish win-x64 framework-dependent
        run: dotnet publish src/ChunithmLauncher/ChunithmLauncher.csproj -c Release -r win-x64 --self-contained false -p:BuildVersion=${env:BUILD_VERSION} -o artifacts/win-x64
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChunithmLauncher-win-x64
          path: artifacts/win-x64
